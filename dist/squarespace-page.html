<!-- Swap Shop single-file embed for Squarespace Code Block -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0314;
  --bg-soft: #1d0828;
  --ink: #ffeef9;
  --muted: #e8cde1;
  --pink: #ff61cc;
  --pink-soft: #ff9ee3;
  --lavender: #cb8eff;
  --glass: rgba(255, 225, 247, 0.12);
  --glass-border: rgba(255, 224, 247, 0.4);
  --shadow: 0 28px 80px rgba(0, 0, 0, 0.6);
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
  cursor: none;
}

body {
  font-family: "Sora", sans-serif;
  background: radial-gradient(circle at 10% 0%, #420b50 0%, var(--bg-soft) 40%, var(--bg) 100%);
  color: var(--ink);
  overflow-x: hidden;
  letter-spacing: 0.01em;
}

.bg-liquid {
  position: fixed;
  inset: -30%;
  background:
    radial-gradient(circle at 17% 20%, rgba(255, 97, 204, 0.34), transparent 42%),
    radial-gradient(circle at 68% 18%, rgba(203, 142, 255, 0.28), transparent 40%),
    radial-gradient(circle at 54% 72%, rgba(255, 176, 234, 0.2), transparent 46%),
    conic-gradient(from 0deg at 50% 50%, rgba(255, 97, 204, 0.16), rgba(220, 167, 255, 0.14), rgba(255, 97, 204, 0.16));
  filter: blur(42px) saturate(130%);
  z-index: -3;
  animation: drift 18s ease-in-out infinite alternate;
}

.bg-noise {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 8;
  opacity: 0.07;
  background-image: radial-gradient(rgba(255, 255, 255, 0.18) 0.7px, transparent 0.7px);
  background-size: 3px 3px;
}

.particle-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: -1;
}

.particle {
  position: absolute;
  top: -8%;
  border-radius: 50%;
  animation: fall linear forwards;
}

.particle.star {
  clip-path: polygon(50% 0%, 61% 36%, 98% 36%, 68% 57%, 79% 92%, 50% 70%, 21% 92%, 32% 57%, 2% 36%, 39% 36%);
  border-radius: 0;
}

.glass {
  background: linear-gradient(140deg, rgba(255, 240, 252, 0.13), rgba(255, 240, 252, 0.06));
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(14px) saturate(145%);
}

.top-bar {
  width: min(95%, 1100px);
  margin: 1rem auto 0;
  border-radius: 16px;
  padding: 0.95rem 1.1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  box-shadow: var(--shadow);
}

.top-bar h1 {
  margin: 0;
  font-size: 0.95rem;
  letter-spacing: 0.22em;
  font-weight: 700;
}

.top-bar p {
  margin: 0.35rem 0 0;
  color: var(--muted);
  font-size: 0.9rem;
}

.sound-btn,
.primary-btn,
.ghost-btn,
.draw-btn,
.coin-slot {
  font-family: "Space Mono", monospace;
  letter-spacing: 0.06em;
  font-weight: 700;
}

.sound-btn {
  border: 1px solid rgba(255, 213, 244, 0.65);
  border-radius: 999px;
  padding: 0.55rem 0.86rem;
  color: var(--ink);
  background: linear-gradient(135deg, rgba(255, 97, 204, 0.32), rgba(255, 174, 236, 0.18));
}

.hero {
  width: min(95%, 1100px);
  margin: 1rem auto 0;
  border-radius: 20px;
  padding: 1.2rem;
  box-shadow: var(--shadow);
}

.eyebrow {
  margin: 0;
  font-family: "Space Mono", monospace;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  color: #ffc7ee;
}

.hero h2 {
  margin: 0.45rem 0 0;
  font-size: clamp(1.45rem, 4vw, 2.35rem);
  line-height: 1.15;
  max-width: 900px;
}

.lead {
  margin: 0.75rem 0 0;
  max-width: 780px;
  line-height: 1.55;
  color: var(--muted);
}

.steps {
  margin-top: 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
}

.step-chip {
  border: 1px solid rgba(255, 216, 243, 0.35);
  border-radius: 999px;
  padding: 0.45rem 0.75rem;
  font-size: 0.75rem;
  color: #ffd6f1;
  background: rgba(255, 203, 238, 0.08);
  transition: 0.2s ease;
}

.step-chip.active {
  border-color: rgba(255, 220, 247, 0.8);
  background: linear-gradient(135deg, rgba(255, 97, 204, 0.45), rgba(203, 142, 255, 0.25));
  box-shadow: 0 0 18px rgba(255, 125, 220, 0.35);
}

.hero-actions {
  margin-top: 1rem;
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
}

.primary-btn,
.draw-btn,
.ghost-btn,
.coin-slot {
  border-radius: 12px;
  padding: 0.64rem 0.94rem;
  color: var(--ink);
  border: 1px solid rgba(255, 215, 244, 0.6);
  cursor: pointer;
}

.primary-btn,
.draw-btn,
.coin-slot {
  background: linear-gradient(140deg, rgba(255, 97, 204, 0.45), rgba(255, 164, 230, 0.25));
}

.ghost-btn {
  background: rgba(255, 205, 239, 0.1);
}

.scene {
  min-height: calc(100vh - 200px);
  display: grid;
  place-items: center;
  padding: 2rem 1rem 4rem;
  perspective: 1200px;
}

.installation {
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.22s ease-out;
}

.neon-cable {
  position: absolute;
  top: 8%;
  width: 15px;
  height: 78%;
  border-radius: 99px;
  background: linear-gradient(180deg, rgba(255, 97, 204, 0.2), rgba(255, 171, 234, 0.9), rgba(203, 142, 255, 0.3));
  box-shadow: 0 0 22px rgba(255, 123, 218, 0.68), 0 0 45px rgba(255, 168, 235, 0.42);
}

.cable-left { left: -34px; }
.cable-right { right: -34px; }
.neon-cable.pulse { animation: cablePulse 0.75s linear infinite; }

.machine {
  width: min(90vw, 520px);
  border-radius: 28px;
  padding: 1.1rem;
  box-shadow: 0 30px 95px rgba(0, 0, 0, 0.68), 0 0 30px rgba(255, 108, 211, 0.35);
  transform: rotateX(4deg);
}

.machine-title {
  text-align: center;
  border-radius: 12px;
  margin-bottom: 0.9rem;
  padding: 0.62rem 0.8rem;
  background: linear-gradient(120deg, rgba(255, 97, 204, 0.52), rgba(255, 189, 238, 0.3));
  font-family: "Space Mono", monospace;
  font-size: 0.82rem;
  letter-spacing: 0.12em;
}

.glass-chamber {
  position: relative;
  border-radius: 18px;
  border: 1px solid rgba(255, 220, 247, 0.5);
  min-height: 250px;
  overflow: hidden;
  padding: 1rem;
  display: grid;
  place-content: center;
  text-align: center;
  background:
    radial-gradient(circle at 33% 24%, rgba(255, 185, 239, 0.21), transparent 40%),
    linear-gradient(180deg, rgba(255, 240, 252, 0.17), rgba(15, 3, 22, 0.78));
}

.glass-chamber::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(transparent, rgba(255, 255, 255, 0.13), transparent);
  transform: translateY(-100%);
  animation: scan 3.4s linear infinite;
}

.glass-chamber.glitch { animation: glitch 0.22s steps(2, end) infinite; }

.capsule {
  position: absolute;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.65);
  box-shadow: inset 0 -11px 18px rgba(0, 0, 0, 0.32), 0 0 20px rgba(255, 139, 229, 0.52);
}

.capsule::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 48%;
  width: 100%;
  height: 48%;
  transform: translateX(-50%);
  border-bottom-left-radius: 55px;
  border-bottom-right-radius: 55px;
  background: rgba(255, 255, 255, 0.2);
}

.capsule-a {
  left: 13%;
  top: 16%;
  background: radial-gradient(circle at 30% 20%, #fff, #ff88de 50%, #a95bff);
  animation: float 5.5s ease-in-out infinite;
}

.capsule-b {
  right: 14%;
  top: 24%;
  background: radial-gradient(circle at 30% 20%, #fff, #ffb3ea 50%, #ff67d1);
  animation: float 6.1s ease-in-out infinite reverse;
}

.capsule-c {
  left: 43%;
  bottom: 16%;
  background: radial-gradient(circle at 30% 20%, #fff, #ffc5ef 50%, #ca8dff);
  animation: float 5.2s ease-in-out infinite;
}

.screen-text {
  position: relative;
  z-index: 2;
  margin: 0;
  font-family: "Space Mono", monospace;
  font-size: 0.82rem;
  line-height: 1.5;
}

.screen-sub {
  position: relative;
  z-index: 2;
  margin: 0.55rem auto 0;
  max-width: 360px;
  font-size: 0.82rem;
  color: #f2cfe8;
}

.draw-actions {
  margin-top: 0.9rem;
  display: grid;
  gap: 0.55rem;
  width: min(100%, 300px);
  position: relative;
  z-index: 2;
}

.machine-controls {
  margin-top: 0.9rem;
  display: flex;
  gap: 0.55rem;
  align-items: center;
  justify-content: center;
}

.mechanic-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid rgba(255, 240, 252, 0.85);
  background:
    radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.14) 34%, rgba(0, 0, 0, 0.58)),
    linear-gradient(145deg, rgba(255, 98, 213, 0.7), rgba(202, 126, 255, 0.52));
  color: var(--ink);
  font: 700 1rem/1 "Space Mono", monospace;
  box-shadow: inset 0 -6px 12px rgba(0, 0, 0, 0.35), 0 0 20px rgba(255, 137, 227, 0.6);
}

.mechanic-btn:active { transform: translateY(2px); }

.machine-helper {
  margin: 0.7rem 0 0;
  text-align: center;
  color: #f3cbe8;
  font-size: 0.8rem;
}

.dispense-bay {
  margin-top: 0.85rem;
  min-height: 112px;
  border-radius: 12px;
  border: 1px solid rgba(255, 220, 247, 0.36);
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.44), rgba(24, 5, 30, 0.9));
  display: grid;
  place-items: center;
  overflow: hidden;
}

.gacha-ball {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.65);
  background: radial-gradient(circle at 30% 20%, #fff, #ff8ce2 45%, #ba67ff);
  display: grid;
  place-items: center;
  text-align: center;
  padding: 0.5rem;
  color: #fff;
  font-family: "Space Mono", monospace;
  font-size: 0.66rem;
  letter-spacing: 0.04em;
  transform: translateY(-230%);
  box-shadow: inset 0 -12px 22px rgba(0, 0, 0, 0.36), 0 0 25px rgba(255, 145, 230, 0.7);
}

.gacha-ball.drop { animation: drop 0.85s cubic-bezier(0.18, 0.9, 0.2, 1) forwards; }

.upload-modal,
.unbox-modal {
  position: fixed;
  z-index: 30;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(92vw, 560px);
  border-radius: 18px;
  padding: 1rem;
  box-shadow: var(--shadow);
}

.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-head h3 {
  margin: 0;
  font-size: 1rem;
}

.close-btn {
  border: 0;
  background: transparent;
  color: var(--ink);
  font-size: 1.3rem;
}

#uploadForm {
  margin-top: 0.8rem;
  display: grid;
  gap: 0.8rem;
}

label,
.palette-area { display: grid; gap: 0.45rem; font-size: 0.9rem; }

input[type="file"],
textarea {
  width: 100%;
  border: 1px solid rgba(255, 220, 247, 0.5);
  border-radius: 10px;
  background: rgba(14, 3, 21, 0.62);
  color: var(--ink);
  padding: 0.58rem;
}

.palette-row { display: flex; gap: 0.5rem; }
input[type="color"] { width: 48px; height: 38px; border: 0; background: transparent; }

.fragment-card {
  margin-top: 0.8rem;
  border-radius: 12px;
  border: 1px solid rgba(255, 220, 247, 0.42);
  background: rgba(16, 4, 23, 0.7);
  padding: 0.75rem;
  min-height: 170px;
  display: grid;
  gap: 0.55rem;
}

.fragment-card h4 {
  margin: 0;
  font-size: 0.95rem;
}

.fragment-preview {
  border-radius: 10px;
  border: 1px dashed rgba(255, 227, 251, 0.35);
  padding: 0.6rem;
  min-height: 100px;
  background: rgba(255, 184, 241, 0.06);
}

.fragment-preview p { margin: 0; line-height: 1.5; color: #f6d9ed; }

.chip-row { display: flex; gap: 0.45rem; }
.chip {
  width: 24px;
  height: 24px;
  border-radius: 7px;
  border: 1px solid rgba(255, 255, 255, 0.55);
}

.result-actions {
  margin-top: 0.8rem;
  display: flex;
  gap: 0.55rem;
}

.small-note {
  margin: 0.75rem 0 0;
  font-size: 0.78rem;
  color: #eec8e0;
}

.toast {
  position: fixed;
  z-index: 40;
  left: 50%;
  bottom: 1rem;
  transform: translateX(-50%);
  border-radius: 999px;
  padding: 0.55rem 0.95rem;
  border: 1px solid rgba(255, 220, 247, 0.42);
  background: rgba(13, 3, 18, 0.82);
  box-shadow: 0 7px 20px rgba(0, 0, 0, 0.45);
  font-family: "Space Mono", monospace;
  font-size: 0.78rem;
}

.coin-cursor {
  position: fixed;
  left: 0;
  top: 0;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(255, 216, 136, 0.85);
  background: radial-gradient(circle at 30% 30%, #fff8c8, #ffc562 50%, #ba7b03);
  box-shadow: 0 0 18px rgba(255, 210, 117, 0.55);
  color: rgba(90, 55, 0, 0.75);
  font: 700 0.75rem/30px "Space Mono", monospace;
  text-align: center;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 60;
}

.hidden { display: none !important; }

@keyframes drift {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(8deg) scale(1.06); }
  100% { transform: rotate(-9deg) scale(1.02); }
}

@keyframes scan {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(200%); }
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

@keyframes cablePulse {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(300deg); }
}

@keyframes glitch {
  0% { transform: translateX(0); }
  35% { transform: translateX(1px); }
  70% { transform: translateX(-1px); }
  100% { transform: translateX(0); }
}

@keyframes drop {
  0% { transform: translateY(-230%); }
  80% { transform: translateY(8%); }
  100% { transform: translateY(0); }
}

@keyframes fall {
  to {
    transform: translateY(115vh) rotate(360deg);
    opacity: 0.1;
  }
}

@media (max-width: 860px) {
  html,
  body { cursor: auto; }

  .coin-cursor { display: none; }

  .top-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  .result-actions {
    flex-direction: column;
  }

  .machine { width: 94vw; }
}
</style>
<script>
const dom = {
  body: document.body,
  scene: document.getElementById("scene"),
  installation: document.getElementById("installation"),
  coinSlot: document.getElementById("coinSlot"),
  beginDeposit: document.getElementById("beginDeposit"),
  drawNow: document.getElementById("drawNow"),
  uploadModal: document.getElementById("uploadModal"),
  closeUpload: document.getElementById("closeUpload"),
  uploadForm: document.getElementById("uploadForm"),
  glassChamber: document.getElementById("glassChamber"),
  screenText: document.getElementById("screenText"),
  screenSub: document.getElementById("screenSub"),
  drawActions: document.getElementById("drawActions"),
  btnA: document.getElementById("btnA"),
  btnB: document.getElementById("btnB"),
  gachaBall: document.getElementById("gachaBall"),
  unboxModal: document.getElementById("unboxModal"),
  closeUnbox: document.getElementById("closeUnbox"),
  fragmentCard: document.getElementById("fragmentCard"),
  saveFragment: document.getElementById("saveFragment"),
  useFragment: document.getElementById("useFragment"),
  toast: document.getElementById("toast"),
  coinCursor: document.getElementById("coinCursor"),
  particleLayer: document.getElementById("particleLayer"),
  soundToggle: document.getElementById("soundToggle"),
  chip1: document.getElementById("chip1"),
  chip2: document.getElementById("chip2"),
  chip3: document.getElementById("chip3"),
};

const fragments = {
  visual: [
    {
      title: "Anonymous Visual Scrap #V014",
      body: "A chrome fish skeleton hanging in front of a pink thunderstorm.",
      colors: ["#ff7ddd", "#ffc8f2", "#cb7fff"],
    },
    {
      title: "Anonymous Visual Scrap #V029",
      body: "A broken cinema seat covered with gel ink and stardust noise.",
      colors: ["#ff63d6", "#ff9de9", "#9ef3ff"],
    },
  ],
  mixed: [
    {
      title: "Anonymous Hybrid Scrap #M051",
      body: "'I glued my failed drafts into a kite and finally let it rise.'",
      colors: ["#ff8be2", "#ffd0f5", "#c97dff"],
    },
    {
      title: "Anonymous Hybrid Scrap #M072",
      body: "Write a character who can only remember in soft static and pink glare.",
      colors: ["#ff57cf", "#ffc3ef", "#7ae9ff"],
    },
  ],
};

const state = {
  selectedMode: null,
  ambientCtx: null,
  ambientNodes: null,
  soundOn: false,
};

function setStage(step) {
  dom.body.dataset.stage = String(step);
  [dom.chip1, dom.chip2, dom.chip3].forEach((chip) => chip.classList.remove("active"));
  if (step === 1) dom.chip1.classList.add("active");
  if (step === 2) dom.chip2.classList.add("active");
  if (step === 3) dom.chip3.classList.add("active");
}

function showToast(message) {
  dom.toast.textContent = message;
  dom.toast.classList.remove("hidden");
  setTimeout(() => dom.toast.classList.add("hidden"), 1850);
}

function vibrate(ms = 35) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

function oneShot({ freq = 280, duration = 0.1, gain = 0.08, type = "triangle" } = {}) {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;
  const ctx = new AudioCtx();
  const osc = ctx.createOscillator();
  const amp = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  amp.gain.value = gain;
  osc.connect(amp).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function setScreen(text, subText = "") {
  dom.screenText.textContent = text;
  dom.screenSub.textContent = subText;
}

function focusMachine() {
  document.getElementById("machine").scrollIntoView({ behavior: "smooth", block: "center" });
}

function openUpload() {
  dom.uploadModal.classList.remove("hidden");
  setScreen("Deposit window open.", "Upload a sketch, a line, or a color scrap to feed the exchange.");
  oneShot({ freq: 560, duration: 0.07, gain: 0.07, type: "square" });
}

function closeUpload() {
  dom.uploadModal.classList.add("hidden");
}

function startAnalysis() {
  dom.glassChamber.classList.add("glitch");
  dom.drawActions.classList.add("hidden");
  setScreen("Analyzing your creative leftovers...", "Looking for anonymous fragments with matching energy.");
  oneShot({ freq: 140, duration: 0.12, gain: 0.1 });

  setTimeout(() => setScreen("Reading sketch / text / palette.", "Preparing two capsule routes: visual or hybrid."), 900);
  setTimeout(() => setScreen("Matching anonymous fragment pool.", "Almost done."), 1700);
  setTimeout(() => {
    dom.glassChamber.classList.remove("glitch");
    setScreen("Step 2 ready: choose A or B.", "A = visual spark, B = text/hybrid spark.");
    dom.drawActions.classList.remove("hidden");
    setStage(2);
    showToast("Analysis complete. Choose A or B.");
  }, 2600);
}

function pulseCables() {
  document.querySelectorAll(".neon-cable").forEach((cable) => {
    cable.classList.add("pulse");
    setTimeout(() => cable.classList.remove("pulse"), 780);
  });
}

function dropCapsule(mode) {
  state.selectedMode = mode;
  const visual = mode === "visual";
  setScreen(
    visual ? "Visual capsule dispensed." : "Hybrid capsule dispensed.",
    "Tap the capsule in the bay to unbox your fragment."
  );
  oneShot({ freq: visual ? 430 : 360, duration: 0.08, gain: 0.1, type: "square" });
  vibrate(48);
  pulseCables();

  dom.gachaBall.classList.remove("hidden", "drop");
  void dom.gachaBall.offsetWidth;
  dom.gachaBall.classList.add("drop");
  setStage(2);
  showToast("Capsule dropped. Tap to unbox.");
}

function renderFragment(mode) {
  const pool = fragments[mode] || fragments.mixed;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  dom.fragmentCard.innerHTML = `
    <h4>${picked.title}</h4>
    <div class="fragment-preview"><p>${picked.body}</p></div>
    <div class="chip-row">
      ${picked.colors.map((color) => `<span class="chip" style="background:${color}"></span>`).join("")}
    </div>
  `;
}

function openUnbox() {
  if (!state.selectedMode) {
    showToast("Choose A or B first.");
    return;
  }
  dom.unboxModal.classList.remove("hidden");
  renderFragment(state.selectedMode);
  setScreen("Step 3: save it or mark it as used.", "When reused in 30 days, the donor gets an anonymous success ping.");
  setStage(3);
  oneShot({ freq: 620, duration: 0.08, gain: 0.11 });
}

function closeUnbox() {
  dom.unboxModal.classList.add("hidden");
}

function setupPointerDepth() {
  dom.scene.addEventListener("pointermove", (event) => {
    const rx = (event.clientX / window.innerWidth - 0.5) * 14;
    const ry = (event.clientY / window.innerHeight - 0.5) * -10;
    dom.installation.style.transform = `rotateY(${rx}deg) rotateX(${ry}deg) translateZ(6px)`;
    dom.coinCursor.style.left = `${event.clientX}px`;
    dom.coinCursor.style.top = `${event.clientY}px`;
  });
}

function spawnParticle() {
  const node = document.createElement("span");
  const isStar = Math.random() > 0.55;
  node.className = `particle ${isStar ? "star" : "bubble"}`;
  const size = 6 + Math.random() * 16;
  node.style.width = `${size}px`;
  node.style.height = `${size}px`;
  node.style.left = `${Math.random() * 100}%`;
  node.style.animationDuration = `${7 + Math.random() * 8}s`;
  node.style.opacity = `${0.3 + Math.random() * 0.6}`;
  node.style.background = isStar
    ? `rgba(255, ${170 + Math.floor(Math.random() * 60)}, 240, 0.9)`
    : "radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,126,220,0.35), rgba(168,82,255,0.18))";

  dom.particleLayer.appendChild(node);
  node.addEventListener("animationend", () => node.remove());
}

function runParticles() {
  for (let i = 0; i < 16; i += 1) spawnParticle();
  setInterval(spawnParticle, 430);
}

function buildAmbientAudio() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;
  if (!state.ambientCtx) state.ambientCtx = new AudioCtx();

  const ctx = state.ambientCtx;
  const drone = ctx.createOscillator();
  const shimmer = ctx.createOscillator();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  const droneGain = ctx.createGain();
  const shimmerGain = ctx.createGain();
  const master = ctx.createGain();

  drone.type = "sine";
  drone.frequency.value = 144;
  shimmer.type = "triangle";
  shimmer.frequency.value = 288;
  lfo.type = "sine";
  lfo.frequency.value = 0.11;
  lfoGain.gain.value = 28;

  droneGain.gain.value = 0.02;
  shimmerGain.gain.value = 0.012;
  master.gain.value = 0.1;

  lfo.connect(lfoGain);
  lfoGain.connect(shimmer.frequency);
  drone.connect(droneGain).connect(master);
  shimmer.connect(shimmerGain).connect(master);
  master.connect(ctx.destination);

  drone.start();
  shimmer.start();
  lfo.start();
  state.ambientNodes = { drone, shimmer, lfo };
}

function stopAmbientAudio() {
  if (!state.ambientNodes) return;
  const { drone, shimmer, lfo } = state.ambientNodes;
  const t = state.ambientCtx.currentTime;
  drone.stop(t + 0.02);
  shimmer.stop(t + 0.02);
  lfo.stop(t + 0.02);
  state.ambientNodes = null;
}

function toggleSound() {
  state.soundOn = !state.soundOn;
  dom.soundToggle.textContent = state.soundOn ? "SOUND ON" : "SOUND OFF";
  dom.soundToggle.setAttribute("aria-pressed", state.soundOn ? "true" : "false");

  if (state.soundOn) {
    buildAmbientAudio();
    showToast("Ethereal ambience enabled.");
  } else {
    stopAmbientAudio();
    showToast("Sound muted.");
  }
}

function skipToDraw() {
  dom.drawActions.classList.remove("hidden");
  setScreen("Step 2 unlocked.", "You skipped deposit. Pick A or B to draw from the pool.");
  setStage(2);
  focusMachine();
  showToast("Draw mode unlocked.");
}

function attachEvents() {
  dom.beginDeposit.addEventListener("click", () => {
    focusMachine();
    openUpload();
  });

  dom.drawNow.addEventListener("click", skipToDraw);
  dom.coinSlot.addEventListener("click", openUpload);
  dom.closeUpload.addEventListener("click", closeUpload);
  dom.closeUnbox.addEventListener("click", closeUnbox);

  dom.uploadForm.addEventListener("submit", (event) => {
    event.preventDefault();
    closeUpload();
    startAnalysis();
  });

  dom.btnA.addEventListener("click", () => dropCapsule("visual"));
  dom.btnB.addEventListener("click", () => dropCapsule("mixed"));
  document.querySelectorAll(".draw-btn").forEach((btn) => {
    btn.addEventListener("click", () => dropCapsule(btn.dataset.mode));
  });

  dom.gachaBall.addEventListener("click", openUnbox);
  dom.saveFragment.addEventListener("click", () => {
    setStage(3);
    showToast("Fragment saved to your vault.");
  });

  dom.useFragment.addEventListener("click", () => {
    setStage(3);
    showToast("Marked as used. 30-day ping armed.");
    closeUnbox();
  });

  dom.soundToggle.addEventListener("click", toggleSound);
}

setStage(1);
setupPointerDepth();
runParticles();
attachEvents();
</script>
