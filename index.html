<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swap Shop Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <section id="intro" class="intro visible">
      <div class="intro-copy">
        <h1>SWAP SHOP</h1>
        <p>exchange unused ideas</p>
        <button id="enterBtn" class="btn">enter</button>
      </div>
    </section>

    <section id="experience" class="experience hidden">
      <canvas id="sceneCanvas"></canvas>

      <button id="historyBtn" class="history-btn">my capsules</button>

      <div class="minimal-ui">
        <button id="depositBtn" class="btn">deposit idea</button>
      </div>

      <button id="pullBtn" class="pull-btn btn">pull capsule</button>

      <div id="idleLine" class="idle-line hidden">ideas never disappear<br>they just change hands</div>

      <div id="capsuleCard" class="overlay hidden">
        <div class="card">
          <h2 id="cardTitle">capsule</h2>
          <div class="card-body">
            <div class="preview" id="cardSketch">sketch fragment</div>
            <p id="cardText">text fragment</p>
            <div id="cardPalette" class="palette"></div>
          </div>
          <div class="card-actions">
            <button id="useBtn" class="btn small">use</button>
            <button id="keepBtn" class="btn small">keep</button>
            <button id="remixBtn" class="btn small">remix</button>
            <button id="closeCardBtn" class="btn small ghost">close</button>
          </div>
        </div>
      </div>

      <div id="depositModal" class="overlay hidden">
        <form id="depositForm" class="card">
          <h2>drop your idea</h2>
          <label>image<input type="file" id="ideaImage" accept="image/*"></label>
          <label>text<textarea id="ideaText" rows="3" placeholder="one unfinished line..."></textarea></label>
          <label>palette
            <div class="palette-inputs">
              <input type="color" value="#ff74d8">
              <input type="color" value="#a985ff">
              <input type="color" value="#77d9ff">
            </div>
          </label>
          <div class="card-actions">
            <button type="submit" class="btn small">seal capsule</button>
            <button type="button" id="closeDepositBtn" class="btn small ghost">close</button>
          </div>
        </form>
      </div>

      <div id="historyShelf" class="shelf hidden">
        <h3>my capsules</h3>
        <div>
          <h4>deposited ideas</h4>
          <ul id="depositedList"></ul>
        </div>
        <div>
          <h4>collected ideas</h4>
          <ul id="collectedList"></ul>
        </div>
      </div>

      <div id="remixTools" class="tools hidden">
        <button class="btn tiny" id="toolDraw">draw</button>
        <button class="btn tiny" id="toolRecolor">recolor</button>
        <button class="btn tiny" id="toolText">rearrange text</button>
      </div>

      <div id="toast" class="toast hidden"></div>
    </section>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
